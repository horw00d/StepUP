[pytest]
# Discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    slow: marks tests that touch the real database or filesystem (deselect with -m "not slow")
    db: marks tests that require a live stepup.db connection